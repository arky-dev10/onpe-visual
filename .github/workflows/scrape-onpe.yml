name: Scrape ONPE

on:
  schedule:
    # cada 5 minutos (GitHub puede retrasar varios min bajo carga)
    - cron: "*/5 * * * *"
  workflow_dispatch: # botón manual

concurrency:
  group: scrape-onpe
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Loop scrape cada 60s por 5 min
        env:
          NO_COLOR: "1"
        run: |
          git config user.name  "onpe-bot"
          git config user.email "onpe-bot@users.noreply.github.com"

          for i in 1 2 3 4 5; do
            echo "── iteración $i/5 ── $(date -u +%T)"
            bun run scrape || echo "  scrape falló, sigo"

            git add public/data/onpe.json public/data/onpe-history.json || true
            if ! git diff --cached --quiet; then
              PCT=$(node -e "console.log(JSON.parse(require('fs').readFileSync('public/data/onpe.json')).pctActas)")
              git commit -m "chore(onpe): ${PCT}% actas · $(date -u +%FT%TZ)"
              # pull --rebase por si el workflow previo aún corría
              git pull --rebase origin main || true
              git push || echo "  push falló, reintento próxima iteración"
            else
              echo "  sin cambios"
            fi

            # no dormir en la última iteración
            if [ "$i" -lt 5 ]; then sleep 60; fi
          done

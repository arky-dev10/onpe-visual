name: Scrape ONPE

on:
  schedule:
    # cada 5 minutos (GitHub puede retrasar varios min bajo carga)
    - cron: "*/5 * * * *"
  workflow_dispatch: # botón manual

concurrency:
  group: scrape-onpe
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Scrape ONPE
        run: bun run scrape
        env:
          # evita color output que ensucia logs
          NO_COLOR: "1"

      - name: Commit & push si cambió
        run: |
          git config user.name  "onpe-bot"
          git config user.email "onpe-bot@users.noreply.github.com"
          git add public/data/onpe.json public/data/onpe-history.json || true
          if git diff --cached --quiet; then
            echo "sin cambios"
            exit 0
          fi
          PCT=$(node -e "console.log(JSON.parse(require('fs').readFileSync('public/data/onpe.json')).pctActas)")
          git commit -m "chore(onpe): ${PCT}% actas · $(date -u +%FT%TZ)"
          git push
